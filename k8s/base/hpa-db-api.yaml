apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: db-api
  labels:
    app.kubernetes.io/component: db-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: db-api
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
