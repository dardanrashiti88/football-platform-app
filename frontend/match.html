<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FODR Match Detail</title>
    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/match.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <img src="../images/web-logo/CUSTOM~1.PNG" alt="FODR logo" />
        </div>

        <div class="nav-center">
          <button class="nav-action nav-home is-active" type="button" aria-label="Home">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l9 8h-3v9h-5v-6H11v6H6v-9H3z" />
            </svg>
          </button>

          <div class="nav-icons">
            <button class="nav-action" type="button" data-label="Fixtures" aria-label="Fixtures">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_User-removebg-preview.png"
                alt=""
              />
            </button>
            <button class="nav-action" type="button" data-label="Players" aria-label="Players">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_User12-removebg-preview.png"
                alt=""
              />
            </button>
            <button class="nav-action" type="button" data-label="Stats" aria-label="Stats">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_User55-removebg-preview.png"
                alt=""
              />
            </button>
            <button class="nav-action" type="button" data-label="Odds" aria-label="Odds">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_User98-removebg-preview.png"
                alt=""
              />
            </button>
            <button class="nav-action" type="button" data-label="News" aria-label="News">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_Use3r-removebg-preview.png"
                alt=""
              />
            </button>
            <button class="nav-action" type="button" data-label="Games" aria-label="Games">
              <img
                class="nav-icon-img"
                src="../images/icons/Copy_of_User1-removebg-preview.png"
                alt=""
              />
            </button>
          </div>
        </div>

        <div class="top-actions">
          <button class="action-btn" type="button" aria-label="Search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="6"></circle>
              <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
            </svg>
          </button>
          <button class="action-btn" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 16v-5a6 6 0 1 0-12 0v5l-2 2h16z"></path>
              <path d="M9 20a3 3 0 0 0 6 0"></path>
            </svg>
          </button>
          <button class="action-btn" type="button" aria-label="Settings">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 8.5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z"></path>
              <path d="M19.4 15a7.7 7.7 0 0 0 0-6l2-1.2-2-3.4-2.2 1a8.2 8.2 0 0 0-5-2l-.6-2.4h-4l-.6 2.4a8.2 8.2 0 0 0-5 2l-2.2-1-2 3.4 2 1.2a7.7 7.7 0 0 0 0 6l-2 1.2 2 3.4 2.2-1a8.2 8.2 0 0 0 5 2l.6 2.4h4l.6-2.4a8.2 8.2 0 0 0 5-2l2.2 1 2-3.4z"></path>
            </svg>
          </button>

          <div class="user-pill" role="button" aria-label="User menu">
            <span class="avatar-dot" aria-hidden="true"></span>
            <span>USER</span>
            <svg class="caret" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M3 6l5 5 5-5"></path>
            </svg>
          </div>
        </div>
      </header>

      <div class="content">
        <aside class="sidebar">
          <div class="sidebar-item active">
            <img
              src="../images/comp-logos/Competition=Men_%20Premier%20League,%20Color=Color.webp"
              alt="Premier League"
            />
          </div>
          <div class="sidebar-item seriea">
            <img src="../images/comp-logos/seriea-enilive-logo_jssflz.png" alt="Serie A" />
          </div>
          <div class="sidebar-item">
            <img src="../images/comp-logos/Screenshot%202026-03-02%20155633.png" alt="LaLiga" />
          </div>
          <div class="sidebar-item">
            <img src="../images/comp-logos/bundesliga-app.svg" alt="Bundesliga" />
          </div>
          <div class="sidebar-item">
            <img src="../images/comp-logos/ligue-1.png" alt="Ligue 1" />
          </div>
          <div class="sidebar-item">
            <img
              src="../images/comp-logos/Competition=Men_%20Champions%20League,%20Color=Color.webp"
              alt="UEFA Champions League"
            />
          </div>
        </aside>

        <main class="main match-main">
          <section class="match-board">
            <div class="detail-top">
              <div class="stat-strip left">
                <div class="stat-box red"></div>
                <div class="stat-box red"></div>
                <div class="stat-box red"></div>
                <div class="stat-box red"></div>
                <div class="stat-box red"></div>
                <div class="stat-box red"></div>
              </div>

              <div class="score-card">
                <div class="score-top">
                  <img
                    class="comp-logo"
                    src="../images/comp-logos/Competition=Men_%20Premier%20League,%20Color=Color.webp"
                    alt="Premier League"
                  />
                </div>
                <div class="score-body">
                  <div class="team-badge">
                    <img src="../images/Teams-logos/Premier-league/liverpool.svg" alt="Liverpool" />
                    <span>L.F.C</span>
                  </div>
                  <div class="score-center">
                    <div class="score">5 - 2</div>
                    <div class="score-meta">90:00</div>
                  </div>
                  <div class="team-badge">
                    <img src="../images/Teams-logos/Premier-league/westham.svg" alt="West Ham" />
                    <span>WEST HAM</span>
                  </div>
                </div>
              </div>

              <div class="stat-strip right">
                <div class="stat-box maroon"></div>
                <div class="stat-box maroon"></div>
                <div class="stat-box maroon wide"></div>
              </div>
            </div>

            <div class="detail-body">
              <aside class="bench bench-left">
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
              </aside>

              <div class="field-wrap">
                <div class="field">
                  <div class="player" style="left: 9%; top: 50%;">
                    <div class="number">11</div>
                    <div class="name">Alisson</div>
                  </div>
                  <div class="player" style="left: 24%; top: 20%;">
                    <div class="number">6</div>
                    <div class="name">Kerkez</div>
                  </div>
                  <div class="player" style="left: 28%; top: 40%;">
                    <div class="number">4</div>
                    <div class="name">Van Dijk</div>
                  </div>
                  <div class="player" style="left: 28%; top: 62%;">
                    <div class="number">5</div>
                    <div class="name">Konate</div>
                  </div>
                  <div class="player" style="left: 24%; top: 84%;">
                    <div class="number">25</div>
                    <div class="name">Frimpong</div>
                  </div>
                  <div class="player" style="left: 42%; top: 32%;">
                    <div class="number">8</div>
                    <div class="name">Szoboszlai</div>
                  </div>
                  <div class="player" style="left: 42%; top: 50%;">
                    <div class="number">7</div>
                    <div class="name">Wirtz</div>
                  </div>
                  <div class="player" style="left: 42%; top: 70%;">
                    <div class="number">10</div>
                    <div class="name">Mc Allister</div>
                  </div>
                  <div class="player" style="left: 60%; top: 28%;">
                    <div class="number">22</div>
                    <div class="name">Ekitike</div>
                  </div>
                  <div class="player" style="left: 60%; top: 52%;">
                    <div class="number">9</div>
                    <div class="name">Isak</div>
                  </div>
                  <div class="player" style="left: 60%; top: 78%;">
                    <div class="number">11</div>
                    <div class="name">Salah</div>
                  </div>

                  <div class="player ghost" style="left: 92%; top: 50%;"></div>
                  <div class="player ghost" style="left: 78%; top: 22%;"></div>
                  <div class="player ghost" style="left: 82%; top: 40%;"></div>
                  <div class="player ghost" style="left: 82%; top: 60%;"></div>
                  <div class="player ghost" style="left: 78%; top: 80%;"></div>
                  <div class="player ghost" style="left: 66%; top: 32%;"></div>
                  <div class="player ghost" style="left: 66%; top: 50%;"></div>
                  <div class="player ghost" style="left: 66%; top: 68%;"></div>
                  <div class="player ghost" style="left: 54%; top: 26%;"></div>
                  <div class="player ghost" style="left: 54%; top: 52%;"></div>
                  <div class="player ghost" style="left: 54%; top: 78%;"></div>
                </div>
              </div>

              <aside class="bench bench-right">
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
                <div class="bench-slot"></div>
              </aside>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
