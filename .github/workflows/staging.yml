name: Staging

on:
  workflow_dispatch:

concurrency:
  group: staging
  cancel-in-progress: true

jobs:
  staging-check:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            db-api/package-lock.json
            Dashboard-view/package-lock.json

      - name: Run testing workflow
        run: bash workflows/testing/run-ci.sh

      - name: Run staging smoke checks
        run: bash workflows/staging/run-smoke.sh
