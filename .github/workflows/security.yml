name: Security

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 4,5 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  schedule-gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Decide whether this scheduled run should execute
        id: gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LOCAL_HOUR="$(TZ=Europe/Tirane date +%H)"
          if [ "$LOCAL_HOUR" = "06" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  security-audit:
    name: Dependency and app security checks
    runs-on: ubuntu-latest
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            db-api/package-lock.json
            Dashboard-view/package-lock.json

      - name: Run security workflow
        run: bash workflows/security/run-security.sh

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    needs: schedule-gate
    if: needs.schedule-gate.outputs.should_run == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
