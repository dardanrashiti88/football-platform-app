<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FOD</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const forceMobile = params.get('mobile') === '1';
        const forceDesktop = params.get('desktop') === '1';
        const userAgent = navigator.userAgent || '';
        const isTouchPhone =
          /Android|iPhone|iPad|iPod|Windows Phone|webOS|BlackBerry/i.test(userAgent) ||
          window.matchMedia('(max-width: 900px)').matches;

        const target = forceDesktop
          ? '/frontend/index.html'
          : forceMobile || isTouchPhone
            ? '/mobile-version/index.html'
            : '/frontend/index.html';

        const suffix = `${window.location.search || ''}${window.location.hash || ''}`;
        window.location.replace(`${target}${suffix}`);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b0b0b;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
      }

      .fallback {
        text-align: center;
      }

      .fallback a {
        color: #f2cf53;
      }
    </style>
  </head>
  <body>
    <div class="fallback">
      <p>Opening FOD…</p>
      <p><a href="/frontend/index.html?desktop=1">Desktop</a> · <a href="/mobile-version/index.html?mobile=1">Mobile</a></p>
    </div>
  </body>
</html>
