<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e7c84b" />
    <title>FOD Mobile</title>
    <link rel="stylesheet" href="./css/variables.css?v=mobile45" />
    <link rel="stylesheet" href="./css/base.css?v=mobile45" />
    <link rel="stylesheet" href="./css/app-shell.css?v=mobile45" />
    <link rel="stylesheet" href="./css/topbar.css?v=mobile45" />
    <link rel="stylesheet" href="./css/auth.css?v=mobile45" />
    <link rel="stylesheet" href="./css/competition-strip.css?v=mobile45" />
    <link rel="stylesheet" href="./css/competition-sections.css?v=mobile45" />
    <link rel="stylesheet" href="./css/mobile-views.css?v=mobile45" />
    <link rel="stylesheet" href="./css/bottom-nav.css?v=mobile45" />
  </head>
  <body>
    <div class="mobile-shell">
      <header id="mobile-topbar"></header>

      <main class="mobile-main">
        <section class="mobile-view is-active" id="mobile-view-home" data-view="home">
          <section id="competition-strip"></section>
          <div class="mobile-day-row">
            <div class="mobile-day-pill">Today</div>
          </div>
          <section id="competition-sections"></section>
        </section>

        <section class="mobile-view" id="mobile-view-leagues" data-view="leagues"></section>
        <section class="mobile-view" id="mobile-view-players" data-view="players"></section>
        <section class="mobile-view" id="mobile-view-stats" data-view="stats"></section>
        <section class="mobile-view" id="mobile-view-quiz" data-view="quiz"></section>
        <section class="mobile-view" id="mobile-view-news" data-view="news"></section>
        <section class="mobile-view" id="mobile-view-cards" data-view="cards"></section>
        <section class="mobile-view" id="mobile-view-profile" data-view="profile"></section>
        <section class="mobile-view" id="mobile-view-settings" data-view="settings"></section>
      </main>

      <nav id="mobile-bottom-nav"></nav>
    </div>

    <script type="module" src="./js/app.js?v=mobile45"></script>
  </body>
</html>
