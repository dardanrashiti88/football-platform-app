<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e7c84b" />
    <title>FOD Mobile Match</title>
    <link rel="stylesheet" href="./css/variables.css?v=mobile45" />
    <link rel="stylesheet" href="./css/base.css?v=mobile45" />
    <link rel="stylesheet" href="./css/app-shell.css?v=mobile45" />
    <link rel="stylesheet" href="./css/topbar.css?v=mobile45" />
    <link rel="stylesheet" href="./css/auth.css?v=mobile45" />
    <link rel="stylesheet" href="./css/bottom-nav.css?v=mobile45" />
    <link rel="stylesheet" href="./css/match-page.css?v=mobile45" />
  </head>
  <body>
    <div class="mobile-shell mobile-shell--match">
      <header id="mobile-topbar"></header>

      <main class="mobile-main mobile-main--match">
        <section class="mobile-match-page" id="mobile-match-page">
          <div class="mobile-match-page__header">
            <button class="mobile-match-back" id="mobile-match-back" type="button">Back</button>
            <div class="mobile-match-page__title">Match Center</div>
          </div>

          <div class="mobile-match-frame-wrap" id="mobile-match-frame-wrap">
            <iframe
              id="mobile-match-frame"
              class="mobile-match-frame"
              title="Match details"
              loading="eager"
            ></iframe>
          </div>
        </section>
      </main>

      <nav id="mobile-bottom-nav"></nav>
    </div>

    <script type="module" src="./js/match-page.js?v=mobile45"></script>
  </body>
</html>
